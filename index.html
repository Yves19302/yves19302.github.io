<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>BTB - Burundi Trade Business</title>

<script src="https://sdk.minepi.com/pi-sdk.js"></script>

<style>
*{
margin:0;
padding:0;
box-sizing:border-box;
font-family:Arial,sans-serif;
}

body{
background:linear-gradient(180deg,#0b3d91,#1e90ff,#87cefa);
color:white;
min-height:100vh;
padding-bottom:90px;
}

header{
padding:20px;
text-align:center;
font-size:24px;
font-weight:bold;
background:rgba(255,255,255,0.1);
}

.search-box{
padding:15px;
}

.search-box input{
width:100%;
padding:14px;
border:none;
border-radius:15px;
}

.hero{
padding:20px;
text-align:center;
}

.section{
padding:15px;
}

.cards{
display:grid;
grid-template-columns:repeat(2,1fr);
gap:15px;
}

.card{
background:rgba(255,255,255,0.15);
padding:15px;
border-radius:20px;
}

.card img{
width:100%;
border-radius:15px;
margin-bottom:10px;
}

.buy-btn,.login-btn{
padding:10px;
border:none;
border-radius:10px;
background:#0b3d91;
color:white;
margin-top:10px;
width:100%;
}

.chatbox,.order-box,.notification{
background:rgba(255,255,255,0.15);
padding:15px;
margin:15px;
border-radius:15px;
}

.profile{
text-align:center;
padding:20px;
}

.profile img{
width:100px;
height:100px;
border-radius:50%;
margin-bottom:10px;
}

nav{
position:fixed;
bottom:0;
left:0;
width:100%;
background:white;
display:flex;
justify-content:space-around;
padding:15px 0;
border-top-left-radius:20px;
border-top-right-radius:20px;
}

nav button{
background:none;
border:none;
font-size:14px;
font-weight:bold;
color:#0b3d91;
}

.tab{
display:none;
}

.active{
display:block;
}
</style>
</head>

<body>

<header>BTB</header>

<div class="search-box">
<input type="text" placeholder="Search products...">
</div>

<!-- MARKETPLACE -->
<div id="marketplace" class="tab active">
<div class="hero">
<h1>Burundi Trade Business</h1>
<p>Buy and sell with Pi</p>
</div>

<div class="section">
<div class="cards">

<div class="card">
<img src="https://via.placeholder.com/150">
<h3>Smartphone</h3>
<p>150 Pi</p>
<button class="buy-btn" onclick="payWithPi('Smartphone',150)">
Buy with Pi
</button>
</div>

<div class="card">
<img src="https://via.placeholder.com/150">
<h3>Shoes</h3>
<p>30 Pi</p>
<button class="buy-btn" onclick="payWithPi('Shoes',30)">
Buy with Pi
</button>
</div>

<div class="card">
<img src="https://via.placeholder.com/150">
<h3>Laptop</h3>
<p>300 Pi</p>
<button class="buy-btn" onclick="payWithPi('Laptop',300)">
Buy with Pi
</button>
</div>

<div class="card">
<img src="https://via.placeholder.com/150">
<h3>Watch</h3>
<p>20 Pi</p>
<button class="buy-btn" onclick="payWithPi('Watch',20)">
Buy with Pi
</button>
</div>

</div>
</div>
</div>

<!-- CHAT -->
<div id="chat" class="tab">
<div class="hero">
<h1>BTB AI Assistant</h1>
</div>
<div class="chatbox">
Ask me anything...
</div>
</div>

<!-- ORDERS -->
<div id="orders" class="tab">
<div class="hero">
<h1>Your Orders</h1>
</div>

<div id="orders-list">
<div class="order-box">No orders yet</div>
</div>
</div>

<!-- NOTIFICATIONS -->
<div id="notifications" class="tab">
<div class="hero">
<h1>Notifications</h1>
</div>

<div class="notification">Welcome to BTB</div>
</div>

<!-- PROFILE -->
<div id="profile" class="tab">
<div class="profile">
<img src="https://via.placeholder.com/100">
<h2 id="username">Guest User</h2>
<p id="wallet-status">Wallet not connected</p>

<button class="login-btn" onclick="loginPi()">Login with Pi</button>
</div>
</div>

<nav>
<button onclick="showTab('chat')">Chat</button>
<button onclick="showTab('marketplace')">Market</button>
<button onclick="showTab('orders')">Orders</button>
<button onclick="showTab('notifications')">Alerts</button>
<button onclick="showTab('profile')">Profile</button>
</nav>

<script>
function showTab(tabId){
let tabs=document.querySelectorAll('.tab');
tabs.forEach(tab=>tab.classList.remove('active'));
document.getElementById(tabId).classList.add('active');
}

Pi.init({
version:"2.0",
sandbox:true
});

async function loginPi(){
try{
const scopes=['username','payments'];

const auth=await Pi.authenticate(scopes,function(payment){
console.log(payment);
});

document.getElementById("username").innerText=auth.user.username;
document.getElementById("wallet-status").innerText="Wallet Connected ✅";

}catch(error){
alert("Pi Login Failed");
}
}

function payWithPi(product,amount){
Pi.createPayment({
amount: amount,
memo: "Buying " + product,
metadata: {product: product}
},{
onReadyForServerApproval: function(paymentId){
console.log("Ready for approval:", paymentId);
},

onReadyForServerCompletion: function(paymentId, txid){
console.log("Ready for completion:", paymentId, txid);
},

onCancel: function(paymentId){
alert("Payment cancelled");
},

onError: function(error, payment){
alert("Payment failed");
},

onCompleted: function(payment, txid){
alert("Payment successful for " + product);

document.getElementById("orders-list").innerHTML += `
<div class="order-box">
<h3>${product}</h3>
<p>${amount} Pi</p>
<p>Status: Paid ✅</p>
</div>`;
}
});
}
</script>

</body>
</html>
